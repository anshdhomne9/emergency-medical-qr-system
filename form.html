<!DOCTYPE html>
<html>
<head>
  <title>Form</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <h2>🩺 Medical Details</h2>

  <input type="text" id="name" placeholder="Name">
  <input type="number" id="age" placeholder="Age">
  <input type="text" id="blood" placeholder="Blood Group">
  <input type="text" id="contact" placeholder="Emergency Contact">
  <textarea id="disease" placeholder="Diseases"></textarea>

  <button onclick="saveData()">Save & Generate QR</button>

  <div id="qrcode"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="app.js"></script>

</body>
</html>
