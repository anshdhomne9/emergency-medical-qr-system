<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <h2>🚀 Welcome to Medical System</h2>

  <div class="card" onclick="goForm()">📝 Fill Medical Form</div>
  <div class="card" onclick="goView()">👁 View Profile</div>
  <div class="card" onclick="goScan()">📷 Scan QR</div>
  <div class="card" onclick="logout()">🚪 Logout</div>
</div>

<script>
function goForm() {
  window.location.href = "form.html";
}

function goView() {
  window.location.href = "view.html";
}

function goScan() {
  window.location.href = "scan.html";
}

function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "index.html";
}
</script>

</body>
</html>
